name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@2817442ee7c3346c1eb7d2ec60263c93206ba14f # v1
      with:
        ndk-version: r26b

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

    - name: Build Rust Engine (Android)
      working-directory: rust_engine
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        cargo install cargo-ndk
        rustup target add aarch64-linux-android armv7-linux-androideabi
        cargo ndk -t arm64-v8a -o ../react-native-open-face/android/src/main/jniLibs build --release
        cargo ndk -t armeabi-v7a -o ../react-native-open-face/android/src/main/jniLibs build --release

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '18'
        cache: 'yarn'
        cache-dependency-path: 'react-native-open-face/example/yarn.lock'

    - name: Install Root Dependencies
      working-directory: react-native-open-face
      run: yarn install

    - name: Install Example Dependencies
      working-directory: react-native-open-face/example
      run: yarn install

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.12'

    - name: Download HuggingFace Models
      working-directory: react-native-open-face/android
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python download_hf_models.py

    - name: Build Android APK
      working-directory: react-native-open-face/example/android
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: app-debug.apk
        path: react-native-open-face/example/android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '18'
        cache: 'yarn'
        cache-dependency-path: 'react-native-open-face/example/yarn.lock'

    - name: Install Root Dependencies
      working-directory: react-native-open-face
      run: yarn install

    - name: Install Example Dependencies
      working-directory: react-native-open-face/example
      run: yarn install

    - name: Build Android APK
      working-directory: react-native-open-face/example/android
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: app-debug.apk
        path: react-native-open-face/example/android/app/build/outputs/apk/debug/app-debug.apk

buildscript {
    ext.safeExtGet = {prop, fallback ->
        rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
    }
    repositories {
        google()
        gradlePluginPortal()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:7.3.1")
    }
}

apply plugin: 'com.android.library'

android {
    namespace "com.OpenFace"
    compileSdkVersion safeExtGet('compileSdkVersion', 33)
    
    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', 26)
        targetSdkVersion safeExtGet('targetSdkVersion', 33)
        versionCode 1
        versionName "1.0"
        
        externalNativeBuild {
            cmake {
                cppFlags "-O2 -frtti -fexceptions -Wall -fstack-protector-all"
                abiFilters "arm64-v8a"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }
    
    buildFeatures {
        prefab true
    }


    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
        }
    }
    
    sourceSets {
        main {
            // Include pre-compiled Rust static/shared libs here
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
    implementation project(':react-native-vision-camera')
}

task downloadHfModels(type: Exec) {
    def assetsDir = file("$projectDir/src/main/assets")
    def requiredModels = [
        new File(assetsDir, "linzaer_detector_int8.onnx"),
        new File(assetsDir, "ghostfacenet_s_int8.onnx"),
        new File(assetsDir, "mini_fas_net_int8.onnx"),
    ]

    onlyIf {
        requiredModels.any { !it.exists() }
    }
    workingDir "$projectDir"
    commandLine 'python', 'download_hf_models.py'
}

preBuild.dependsOn downloadHfModels

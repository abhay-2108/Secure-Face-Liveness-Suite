buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 26
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.3.11579264"
        kotlinVersion = "1.9.25"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
}

def visionCameraCxxDir = rootProject.findProperty("visionCameraCxxDir")
if (visionCameraCxxDir) {
    subprojects { subproject ->
        if (subproject.name == "react-native-vision-camera") {
            subproject.afterEvaluate {
                if (subproject.hasProperty("android") && subproject.android?.externalNativeBuild?.cmake != null) {
                    subproject.android.externalNativeBuild.cmake.buildStagingDirectory = file(visionCameraCxxDir)
                }
            }
        }
    }
}
